version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kolo
      POSTGRES_PASSWORD: kolo_secret
      POSTGRES_DB: kolo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kolo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://kolo:kolo_secret@postgres:5432/kolo
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-three}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-four}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@kolo.app}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-change-me-five}
      NOMBA_ENVIRONMENT: test
      NOMBA_PARENT_ACCOUNT_ID: ${NOMBA_PARENT_ACCOUNT_ID}
      NOMBA_SUB_ACCOUNT_ID: ${NOMBA_SUB_ACCOUNT_ID}
      NOMBA_TEST_CLIENT_ID: ${NOMBA_TEST_CLIENT_ID}
      NOMBA_TEST_PRIVATE_KEY: ${NOMBA_TEST_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
