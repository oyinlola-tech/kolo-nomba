<!DOCTYPE html>
<html lang="en-NG">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <meta name="color-scheme" content="light dark" />
    <!--
      IMPORTANT: CSP via meta tag ONLY covers basic loading.
      FOR PRODUCTION: Move this CSP to HTTP headers at your CDN/host layer (Vercel, Netlify, Cloudflare, Nginx).
      The meta tag CSP cannot enforce frame-ancestors or report-uri.
      The connect-src 'self' allows the frontend's own origin; VITE_API_URL must be on the same origin
      OR you must add the API origin to connect-src in your HTTP-header version of this policy.
      In dev mode, Vite HMR injects inline scripts — remove this meta tag entirely for dev,
      or add 'unsafe-inline' to script-src.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               style-src 'self' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' data:;
               connect-src 'self';
               base-uri 'self'" />

    <title>KOLO — Digital Cooperative Savings Platform for Modern Africa</title>
    <meta name="description" content="KOLO digitizes traditional African cooperative savings (Ajo/Esusu). Join a group, contribute via bank transfer/USSD/card, track savings in real-time, and receive payouts securely. Free plan available." />
    <meta name="keywords" content="cooperative savings, Ajo, Esusu, digital savings, group savings, Nigeria, Africa, fintech, thrift collection" />
    <meta name="application-name" content="KOLO" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://kolosavings.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="apple-touch-icon" href="/assets/favicon.svg" sizes="48x48" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KOLO" />
    <meta property="og:title" content="KOLO — Digital Cooperative Savings Platform for Modern Africa" />
    <meta property="og:description" content="Digitize your cooperative savings with KOLO. Bank transfers, USSD, cards. Track contributions in real-time. Free plan available." />
    <meta property="og:image" content="/logo.svg" />
    <meta property="og:url" content="https://kolosavings.com" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KOLO — Digital Cooperative Savings Platform for Modern Africa" />
    <meta name="twitter:description" content="Digitize your cooperative savings with KOLO. Bank transfers, USSD, cards. Free plan available." />
    <meta name="twitter:image" content="/logo.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
